<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản trị khảo sát</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      padding: 28px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #e9ecef;
    }

    .stat-number {
      font-size: 2em;
      font-weight: bold;
      color: #316dfa;
      margin-bottom: 5px;
    }

    .stat-label {
      color: #6c757d;
      font-size: 0.9em;
    }

    .download-btn {
      background-color: #28a745;
      color: #fff;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .download-btn:hover {
      background-color: #218838;
    }

    .submissions-list {
      margin-top: 30px;
    }

    .submission-item {
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      background: #f8f9fa;
    }

    .submission-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .submission-name {
      font-weight: bold;
      color: #316dfa;
    }

    .submission-time {
      color: #6c757d;
      font-size: 0.9em;
    }

    .submission-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 0.9em;
    }

    .detail-item {
      margin-bottom: 5px;
    }

    .detail-label {
      font-weight: bold;
      color: #495057;
    }

    .expectations-text {
      grid-column: 1 / -1;
      margin-top: 10px;
      padding: 10px;
      background: #fff;
      border-radius: 4px;
      border-left: 4px solid #316dfa;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #e9ecef;">
      <h1 style="margin: 0;">Quản trị khảo sát</h1>
      <button onclick="logout()" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">Đăng xuất</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="total-count">0</div>
        <div class="stat-label">Tổng đăng ký</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="today-count">0</div>
        <div class="stat-label">Đăng ký hôm nay</div>
      </div>
    </div>

    <button class="download-btn" onclick="downloadExcel()">📊 Tải xuống Excel</button>

    <div class="submissions-list">
      <h2>Danh sách đăng ký</h2>
      <div id="submissions-container">
        <p>Đang tải...</p>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      if (confirm('Bạn chắc chắn muốn đăng xuất?')) {
        window.location.href = '/admin-logout';
      }
    }

    async function loadData() {
      try {
        const response = await fetch('/api/submissions');
        const submissions = await response.json();

        // Cập nhật thống kê
        document.getElementById('total-count').textContent = submissions.length;

        const today = new Date().toDateString();
        const todayCount = submissions.filter(s => new Date(s.submittedAt).toDateString() === today).length;
        document.getElementById('today-count').textContent = todayCount;

        // Hiển thị danh sách
        const container = document.getElementById('submissions-container');
        if (submissions.length === 0) {
          container.innerHTML = '<p>Chưa có đăng ký nào.</p>';
          return;
        }

        container.innerHTML = submissions.reverse().map(submission => `
          <div class="submission-item">
            <div class="submission-header">
              <div class="submission-name">${submission.studentName}</div>
              <div class="submission-time">${new Date(submission.submittedAt).toLocaleString('vi-VN')}</div>
            </div>
            <div class="submission-details">
              <div class="detail-item">
                <span class="detail-label">MSSV:</span> ${submission.studentId}
              </div>
              <div class="detail-item">
                <span class="detail-label">Email:</span> ${submission.studentEmail}
              </div>
              <div class="detail-item">
                <span class="detail-label">Ngành:</span> ${submission.studentMajor || submission.major || 'N/A'}
              </div>
              <div class="detail-item">
                <span class="detail-label">Lớp:</span> ${submission.studentClass}
              </div>
              <div class="detail-item">
                <span class="detail-label">Mã dự thưởng:</span> <strong style="color: #316dfa;">${submission.rewardCode || 'N/A'}</strong>
              </div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('submissions-container').innerHTML = '<p>Lỗi tải dữ liệu.</p>';
        console.error('Error loading data:', error);
      }
    }

    function downloadExcel() {
      window.location.href = '/download-excel';
    }

    // Tải dữ liệu khi trang load
    loadData();

    // Tự động refresh mỗi 30 giây
    setInterval(loadData, 30000);
  </script>
</body>
</html>
