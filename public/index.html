<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khảo sát sinh viên</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Khảo sát cho sinh viên</h1>
    <p>Nhập thông tin của bạn và trả lời các câu hỏi khảo sát.</p>

    <form id="survey-form">
      <label for="studentName">Họ và tên:</label>
      <input type="text" id="studentName" name="studentName" required />

      <label for="studentId">Mã số Sinh viên (MSSV):</label>
      <input type="text" id="studentId" name="studentId" required />

      <label for="studentEmail">Email nhận thông tin:</label>
      <input type="email" id="studentEmail" name="studentEmail" required />

      <label for="studentMajor">Ngành:</label>
      <select id="studentMajor" name="studentMajor" required>
        <option value="">-- Chọn ngành --</option>
        <option value="Công nghệ giáo dục">Công nghệ giáo dục</option>
        <option value="Quản lý giáo dục">Quản lý giáo dục</option>
      </select>

      <label for="studentClass">Lớp:</label>
      <input type="text" id="studentClass" name="studentClass" required placeholder="Nhập lớp của bạn" />

      <button type="submit">Gửi đăng ký</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
